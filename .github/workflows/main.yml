name: CI/CD Pipeline

# Define quando a pipeline será executada [cite: 29]
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
        # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

        # 2. Configura o Node.js (v18 é a recomendada para Vercel)
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

          # 3. Instala as dependências (React, TS, Firebase)
      - name: Instalar dependências
        run: npm install

        # 4. Executa o Lint (Vai acusar os erros acima se você não arrumar!)
      - name: Rodar Lint
        run: npm run lint

        # 5. Tenta gerar o build (se falhar aqui, não vai para a Vercel)
      - name: Build do projeto
        run: npm run build

        # 6. Executa os testes unitários
      - name: Rodar testes
        run: npm run test
     
        # 7. Executa os testes de ponta a ponta (Cypress)
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
           build: npm run build
           start: npm run dev
           wait-on: 'http://localhost:5173'
